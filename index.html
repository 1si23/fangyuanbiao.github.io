<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塞翁公寓 · 房源总览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f4f9; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: #fff; border-radius: 28px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        h1 { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; font-size: 1.8rem; color: #0a1a2e; border-bottom: 2px solid #eef2f7; padding-bottom: 14px; margin-bottom: 22px; }
        h1 small { font-size: 0.9rem; font-weight: 400; color: #5b6f8b; }
        .contact-bar { background: #eef4ff; padding: 8px 20px; border-radius: 40px; font-size: 1rem; color: #0a1a2e; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; margin-top: 4px; }
        .contact-bar .phone { color: #1a5fb0; font-weight: 700; font-size: 1.2rem; letter-spacing: 1px; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 10px 16px; background: #f7faff; padding: 12px 18px; border-radius: 40px; border: 1px solid #e2eaf3; margin-bottom: 28px; align-items: center; }
        .filter-bar select, .filter-bar input { padding: 8px 16px; border-radius: 30px; border: 1px solid #d6e0ec; background: white; font-size: 0.9rem; outline: none; }
        .filter-bar .reset-btn { background: #eef2f8; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; margin-left: auto; }
        .filter-bar .reset-btn:hover { background: #dce6f2; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #fff; border-radius: 20px; padding: 18px; border: 1px solid #e6ecf3; transition: 0.25s; }
        .card:hover { transform: translateY(-4px); border-color: #b0c6dd; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .store { font-weight: 600; font-size: 1.1rem; color: #1a3150; }
        .address { font-size: 0.8rem; color: #61758f; margin: 2px 0 6px; }
        .room { font-weight: 700; font-size: 1.2rem; color: #0e2846; margin: 4px 0; }
        .price { font-weight: 700; font-size: 1.4rem; color: #0e2846; background: #e8f0fe; padding: 0 14px; border-radius: 30px; display: inline-block; }
        .price small { font-weight: 400; font-size: 0.8rem; color: #3b5c7a; }
        .original { color: #869bb3; text-decoration: line-through; font-size: 0.9rem; margin-right: 10px; }
        .media { margin-top: 14px; border-top: 1px dashed #dee6ef; padding-top: 14px; }
        .media img { width: 100%; border-radius: 12px; max-height: 200px; object-fit: cover; border: 1px solid #e6ecf3; margin-bottom: 6px; }
        .media video { width: 100%; border-radius: 12px; max-height: 200px; }
        .no-media { color: #9aafc4; font-size: 0.85rem; padding: 6px 0; text-align: center; }
        .tag { background: #eef4ff; color: #1f3a6b; padding: 2px 12px; border-radius: 20px; font-size: 0.7rem; display: inline-block; }
        .footer { margin-top: 28px; padding-top: 16px; border-top: 1px solid #eef2f7; color: #7f93ab; font-size: 0.8rem; text-align: center; }
        .loading { text-align: center; padding: 40px; color: #5b6f8b; }
        .error { text-align: center; padding: 40px; color: #b34a4a; background: #fff5f5; border-radius: 20px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .filter-bar .reset-btn { margin-left: 0; width: 100%; text-align: center; } }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <span>
            🏠 塞翁公寓 · 房源总览
            <div class="contact-bar">📞 看房联系 <span class="phone">19231808993</span></div>
        </span>
        <small>数据来自 GitHub · 实时同步</small>
    </h1>

    <div class="filter-bar">
        <label for="areaFilter">📍 区域</label>
        <select id="areaFilter"><option value="">全部</option></select>
        <label for="storeFilter">🏢 门店</label>
        <select id="storeFilter"><option value="">全部</option></select>
        <input type="number" id="priceMin" placeholder="最低月租" style="width:100px;">
        <span>—</span>
        <input type="number" id="priceMax" placeholder="最高月租" style="width:100px;">
        <button class="reset-btn" id="resetFilterBtn">重置筛选</button>
    </div>

    <div class="grid" id="cardContainer"><div class="loading">⏳ 正在加载房源...</div></div>
    <div class="footer">数据更新于：<span id="updateTime">--</span> · 修改 data.json 即自动更新</div>
</div>

<script>
    // ================================================================
    // 🔑 数据地址
    // ================================================================
    const DATA_URL = 'https://raw.githubusercontent.com/1si23/fangyuanbiao.github.io/main/data.json';

    // ================================================================
    // 以下代码自动运行，无需修改
    // ================================================================

    let allData = [];

    const container = document.getElementById('cardContainer');
    const areaFilter = document.getElementById('areaFilter');
    const storeFilter = document.getElementById('storeFilter');
    const priceMin = document.getElementById('priceMin');
    const priceMax = document.getElementById('priceMax');
    const resetBtn = document.getElementById('resetFilterBtn');
    const updateTime = document.getElementById('updateTime');

    // 自动修复图片链接
    function fixImageUrl(url) {
        if (!url) return null;
        let fixed = url.trim();
        // github.com/.../blob/ → raw.githubusercontent.com/.../
        if (fixed.includes('github.com') && fixed.includes('/blob/')) {
            fixed = fixed.replace('github.com', 'raw.githubusercontent.com')
                         .replace('/blob/', '/');
        }
        // 去掉 ?raw=true
        if (fixed.includes('?raw=true')) {
            fixed = fixed.replace('?raw=true', '');
        }
        // 去掉 /refs/heads/
        if (fixed.includes('/refs/heads/')) {
            fixed = fixed.replace('/refs/heads/', '/');
        }
        return fixed;
    }

    async function loadData() {
        try {
            const response = await fetch(DATA_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (!Array.isArray(data) || data.length === 0) {
                throw new Error('data.json 数据为空或格式不正确');
            }
            allData = data.map(item => {
                let images = Array.isArray(item.图片) ? item.图片 : (item.图片 ? [item.图片] : []);
                images = images.map(url => fixImageUrl(url)).filter(Boolean);
                
                let videos = Array.isArray(item.视频) ? item.视频 : (item.视频 ? [item.视频] : []);
                videos = videos.map(url => fixImageUrl(url)).filter(Boolean);

                return {
                    area: item.区域 || '',
                    store: item.门店名称 || '',
                    address: item.地址 || '',
                    room: item.房间号 || item['房间号/户型'] || '',
                    original: item.原价 ? Number(item.原价) : null,
                    sale: item.月租 || item['一口价/月租'] ? Number(item.月租 || item['一口价/月租']) : null,
                    note: item.备注 || '',
                    utility: item.水电 || '',
                    images: images,
                    videos: videos
                };
            });
            populateFilters();
            renderCards(allData);
        } catch (error) {
            container.innerHTML = `<div class="error">❌ 加载失败：${error.message}</div>`;
        }
    }

    function populateFilters() {
        const areas = [...new Set(allData.map(d => d.area).filter(Boolean))].sort();
        const stores = [...new Set(allData.map(d => d.store).filter(Boolean))].sort();
        areaFilter.innerHTML = '<option value="">全部</option>' + areas.map(a => `<option value="${a}">${a}</option>`).join('');
        storeFilter.innerHTML = '<option value="">全部</option>' + stores.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function renderCards(filtered) {
        if (!filtered || filtered.length === 0) {
            container.innerHTML = `<div class="loading">🏷️ 没有匹配的房源</div>`;
            return;
        }
        let html = '';
        filtered.forEach(item => {
            const originalHtml = item.original ? `<span class="original">¥${item.original}</span>` : '';
            const saleHtml = item.sale ? `<span class="price">¥${item.sale} <small>月租</small></span>` : '';

            let imgHtml = '';
            if (item.images && item.images.length > 0) {
                const validImages = item.images.filter(url => url && url.startsWith('http'));
                if (validImages.length > 0) {
                    imgHtml = validImages.slice(0, 3).map(url => 
                        `< img src="${url}" alt="房源图片" loading="lazy" onerror="this.style.display='none'">`
                    ).join('');
                }
            }
            let videoHtml = '';
            if (item.videos && item.videos.length > 0 && item.videos[0]) {
                videoHtml = `<video controls preload="metadata" style="width:100%;border-radius:12px;max-height:200px;"><source src="${item.videos[0]}" type="video/mp4"></video>`;
            }
            const mediaHtml = (imgHtml || videoHtml) ? `<div class="media">${imgHtml}${videoHtml}</div>` : `<div class="media"><div class="no-media">📭 暂无图片或视频</div></div>`;

            html += `
                <div class="card">
                    <div class="store">${item.store || '未命名'}</div>
                    <div class="address">📍 ${item.address || ''} · ${item.room || ''}</div>
                    <div class="room">${item.room || '无房号'}</div>
                    <div style="margin: 8px 0 6px;">${originalHtml} ${saleHtml}</div>
                    <div style="font-size:0.75rem;color:#61758f;display:flex;flex-wrap:wrap;gap:4px 8px;margin-bottom:6px;">
                        ${item.note ? `<span class="tag">${item.note}</span>` : ''}
                        ${item.utility ? `<span class="tag">${item.utility}</span>` : ''}
                    </div>
                    ${mediaHtml}
                </div>
            `;
        });
        container.innerHTML = html;
        updateTime.textContent = new Date().toLocaleString('zh-CN');
    }

    function filterData() {
        const areaVal = areaFilter.value;
        const storeVal = storeFilter.value;
        const minVal = parseFloat(priceMin.value);
        const maxVal = parseFloat(priceMax.value);

        const filtered = allData.filter(item => {
            if (areaVal && item.area !== areaVal) return false;
            if (storeVal && item.store !== storeVal) return false;
            const price = item.sale;
            if (price === null || price === undefined) {
                if (!isNaN(minVal) || !isNaN(maxVal)) return false;
                return true;
            }
            if (!isNaN(minVal) && price < minVal) return false;
            if (!isNaN(maxVal) && price > maxVal) return false;
            return true;
        });
        renderCards(filtered);
    }

    areaFilter.addEventListener('change', filterData);
    storeFilter.addEventListener('change', filterData);
    priceMin.addEventListener('input', filterData);
    priceMax.addEventListener('input', filterData);
    resetBtn.addEventListener('click', () => {
        areaFilter.value = '';
        storeFilter.value = '';
        priceMin.value = '';
        priceMax.value = '';
        filterData();
    });

    loadData();
</script>
</body>
</html>
