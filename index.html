<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏠 房源价格表</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { background: #f4f6fa; padding: 2rem 1.5rem; display: flex; flex-direction: column; align-items: center; }
    .container { max-width: 1440px; width: 100%; }

    .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; background: white; padding: 1rem 1.8rem; border-radius: 32px; }
    .header h1 { font-size: 1.8rem; color: #0b1b33; }
    .header h1 small { font-size: 0.9rem; font-weight: 400; color: #5e6f8d; background: #eef2f7; padding: 0.2rem 0.9rem; border-radius: 40px; margin-left: 6px; }
    .badge-count { background: #eef2f7; padding: 0.4rem 1.2rem; border-radius: 60px; font-size: 0.9rem; color: #1f2a44; }

    .contact-btn { display: inline-flex; align-items: center; gap: 8px; background: #1f3a6b; color: white; padding: 0.6rem 1.6rem; border-radius: 60px; text-decoration: none; font-weight: 500; }
    .contact-btn:hover { background: #12315c; }

    .filter-bar { background: white; border-radius: 28px; padding: 0.9rem 1.8rem; margin-bottom: 24px; display: flex; flex-wrap: wrap; align-items: center; gap: 18px 28px; }
    .filter-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .filter-group label { font-size: 0.85rem; font-weight: 500; color: #1f2a44; }
    .filter-group select, .filter-group input { padding: 0.4rem 0.9rem; border-radius: 60px; border: 1px solid #dce2ec; background: #f9fafc; font-size: 0.85rem; outline: none; min-width: 110px; }
    .filter-group input[type="number"] { width: 100px; }
    .filter-actions { display: flex; gap: 8px; margin-left: auto; }
    .btn-reset { background: #eef2f7; border: none; padding: 0.4rem 1.4rem; border-radius: 60px; font-weight: 500; cursor: pointer; }
    .filter-stats { font-size: 0.8rem; color: #5e6f8d; background: #f2f5fa; padding: 0.2rem 1rem; border-radius: 60px; }

    .table-wrapper { background: white; border-radius: 28px; overflow: auto; padding: 0.25rem 0; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 1100px; }
    th { text-align: left; padding: 1.2rem 0.8rem 0.9rem; background: #f9fafc; font-weight: 600; font-size: 0.8rem; border-bottom: 2px solid #e4e9f2; position: sticky; top: 0; z-index: 5; }
    td { padding: 0.7rem 0.8rem; border-bottom: 1px solid #eef2f7; vertical-align: middle; }
    .store-group { background: #fafbff !important; font-weight: 500; border-right: 1px solid #e8edf6; }
    .store-name { background: #eef3fc; padding: 0.15rem 0.6rem; border-radius: 40px; font-size: 0.8rem; color: #1f3a6b; }
    .highlight-price { font-weight: 600; color: #1f3a6b; background: #f1f6fe; padding: 0.15rem 0.5rem; border-radius: 30px; }
    .tag { background: #eaeef5; padding: 0.1rem 0.6rem; border-radius: 40px; font-size: 0.7rem; color: #2f405e; }
    .tag-primary { background: #d9e4fc; color: #1f3a8a; }
    .tag-warning { background: #fff3e0; color: #a8600f; }
    .tag-success { background: #e1f3e8; color: #136b4b; }
    .water-electric { font-size: 0.75rem; color: #4c5e7c; background: #f2f5fa; padding: 0.2rem 0.6rem; border-radius: 40px; }
    .media-cell { text-align: center; min-width: 70px; }
    .media-cell .cover { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 1px solid #e4e9f2; display: block; margin: 0 auto; }
    .media-cell .cover:hover { transform: scale(1.05); border-color: #1f3a6b; }
    .media-cell .badge-count-small { display: block; font-size: 0.6rem; color: #8b9bb5; margin-top: 2px; }
    .media-placeholder { color: #b0c0d4; font-size: 0.7rem; background: #f2f5fa; padding: 0.2rem 0.6rem; border-radius: 40px; }
    .no-result td { text-align: center; padding: 2.5rem 0; color: #8b9bb5; }

    /* 轮播弹窗 */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #1a1a2e; border-radius: 20px; max-width: 820px; width: 100%; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .modal-header .room-label { color: #c8d0e0; font-weight: 500; }
    .modal-header .close-btn { background: rgba(255,255,255,0.08); border: none; color: #c8d0e0; font-size: 1.6rem; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
    .modal-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px 20px; min-height: 300px; background: #0f0f1a; }
    .modal-body .slide-img, .modal-body .slide-video { max-width: 100%; max-height: 62vh; border-radius: 10px; object-fit: contain; }
    .modal-body .slide-video { width: 100%; max-height: 62vh; }
    .modal-footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .modal-footer .nav-btn { background: rgba(255,255,255,0.08); border: none; color: #c8d0e0; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
    .modal-footer .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .modal-footer .counter { color: #8892a8; }
    .thumbnails { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; flex-shrink: 0; }
    .thumbnails img, .thumbnails video { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
    .thumbnails img.active, .thumbnails video.active { border-color: #5b7fc7; }

    .watermark-note { margin-top: 2rem; text-align: center; color: #8b9bb5; font-size: 0.8rem; border-top: 1px solid #e2e8f0; padding-top: 1.8rem; max-width: 600px; }

    @media (max-width: 760px) {
      body { padding: 1rem 0.5rem; }
      .header { flex-direction: column; align-items: stretch; }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .filter-actions { margin-left: 0; justify-content: flex-end; }
      table { font-size: 0.7rem; min-width: 820px; }
      .media-cell .cover { width: 44px; height: 44px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>📋 房源价格表 <small>自动探测张数</small></h1>
      <span class="badge-count" id="totalBadge">🏷️ 共 42 条房源</span>
    </div>
    <a href="tel:19231808993" class="contact-btn">📞 看房联系 19231808993</a>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <label>🏷️ 门店</label>
      <select id="storeFilter"><option value="all">全部门店</option></select>
    </div>
    <div class="filter-group">
      <label>💰 价格</label>
      <input type="number" id="priceMin" placeholder="最低" min="0" step="100">
      <span style="color:#8b9bb5;">—</span>
      <input type="number" id="priceMax" placeholder="最高" min="0" step="100">
    </div>
    <div class="filter-actions">
      <span class="filter-stats" id="filterStats">显示 42 条</span>
      <button class="btn-reset" id="resetFilterBtn">重置筛选</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead><tr><th>门店名称</th><th>地址</th><th>房间号</th><th>原价</th><th>一口价/月租</th><th>备注</th><th>水电</th><th>图片/视频</th></tr></thead>
      <tbody id="priceTableBody"></tbody>
    </table>
  </div>
  <div class="watermark-note">⚡ 图片放在 images/ 文件夹，命名规则：房间号_1.jpg ~ 房间号_N.jpg（有几张放几张）</div>
</div>

<!-- 轮播弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <div class="modal-header">
      <span class="room-label" id="modalRoomLabel">房间号</span>
      <button class="close-btn" id="modalCloseBtn">✕</button>
    </div>
    <div class="modal-body" id="modalBody"><img class="slide-img" id="modalSlide" src=""></div>
    <div class="thumbnails" id="thumbnailsContainer"></div>
    <div class="modal-footer">
      <button class="nav-btn" id="prevBtn">‹ 上一张</button>
      <span class="counter" id="modalCounter">1 / 10</span>
      <button class="nav-btn" id="nextBtn">下一张 ›</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
